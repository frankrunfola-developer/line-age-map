{% extends "base.html" %}
{% set active_page = "tree" %}

{% block title %}LineAgeMap — Tree{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/tree.css') }}?v={{ time.time() }}">
{% endblock %}

{% block content %}
<div class="appFrameShell treePageShell">
  <section class="appFrameCard treePageCard" aria-label="Family Tree">
    <header class="treePageHeader">
      {% if request.args.get('embed') != '1' %}
      <div class="treeToolbar" role="group" aria-label="Tree controls">
        <button id="treeDepthToggleBtn" class="treeToolbarBtn" type="button">See Full Tree</button>
        <button id="fitTreeBtn" class="treeToolbarBtn" type="button">Fit to screen</button>
      </div>
      {% endif %}
    </header>

    <div
      id="treeCanvas"
      class="treeCanvas"
      data-tree-api-url="{{ tree_api_url or TREE_API_URL or '/api/sample/stark/tree' }}">
      <svg id="treeSvg" role="img" aria-label="Family tree diagram"></svg>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script>
  window.TREE_API_URL = {{ (tree_api_url or TREE_API_URL or '/api/sample/stark/tree')|tojson }};
</script>
<script type="module" src="{{ url_for('static', filename='js/tree.js') }}?v={{ time.time() }}"></script>
{% endblock %}
